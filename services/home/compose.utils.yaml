services:
    dozzle:
        image: amir20/dozzle:v10.5.3
        container_name: dozzle
        volumes:
            - /var/run/docker.sock:/var/run/docker.sock
            - ${dozzle_data}:/data
        healthcheck:
            test: ["CMD", "/dozzle", "healthcheck"]
            interval: 2m
            timeout: 30s
            retries: 3
            start_period: 30s
        # ports:
        #     - "${DOZZLE_PORT}:8080"

        restart: unless-stopped
        networks:
            - home
        environment:
            - DOZZLE_ENABLE_ACTIONS=true
            - DOZZLE_ENABLE_SHELL=true

            - TZ="${TZ}"
            #
            # Uncomment to enable authentication. See https://dozzle.dev/guide/authentication
            #- DOZZLE_AUTH_PROVIDER=simple

    beszel:
        image: henrygd/beszel:0.18.7
        container_name: beszel
        restart: unless-stopped
        environment:
            APP_URL: "http://${TAILSCALE_IP}:8090"
        ports:
            - ${BESZEL_PORT}:8090
        volumes:
            - ${BESZEL_DATA}:/beszel_data
            - beszel_socket:/beszel_socket
        networks:
            - home
        healthcheck:
            test: ["CMD", "/beszel", "health", "--url", "http://localhost:8090"]
            interval: 2m
            timeout: 30s
            retries: 3
            start_period: 30s

    uptime-kuma:
        image: louislam/uptime-kuma:2.2.1-slim
        container_name: uptime-kuma
        restart: unless-stopped
        # ports:
        #     - "${UK_PORT}:3001"
        volumes:
            - ${UK_DATA}:/app/data
        networks:
            - home
        environment:
            - TZ=${TZ}
            - UMASK=0022
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:3001"]
            interval: 30s
            retries: 3
            start_period: 10s
            timeout: 5s
        logging:
            driver: "json-file"
            options:
                max-size: "10m"
                max-file: "3"

    homepage:
        image: ghcr.io/gethomepage/homepage:v1.13.1
        container_name: homepage
        environment:
            - HOMEPAGE_VAR_JELLYFIN_API_KEY=${JELLYFIN_API_KEY}
            - HOMEPAGE_VAR_BESZEL_USERNAME=${BESZEL_USERNAME}
            - HOMEPAGE_VAR_BESZEL_PASSWORD=${BESZEL_PASSWORD}
            - HOMEPAGE_VAR_PIHOLE_PASSWORD=${PIHOLE_PASSWORD}
            - HOMEPAGE_VAR_KAVITA_API=${HOMEPAGE_VAR_KAVITA_API}
            - HOMEPAGE_VAR_TS_API_KEY=${HOMEPAGE_VAR_TS_API_KEY}
            - HOMEPAGE_VAR_PORTAINER=${HOMEPAGE_VAR_PORTAINER}
            - HOMEPAGE_ALLOWED_HOSTS=${HP_ALLOWED_HOSTS}
            - HOMEPAGE_VAR_DOMAIN=${DOMAIN}
        # ports:
        #     - 9001:3000
        volumes:
            - ./files/services.yaml:/app/config/services.yaml
            - /var/run/docker.sock:/var/run/docker.sock:ro
        networks:
            - home
        restart: unless-stopped

    portainer:
        image: portainer/portainer-ce:2.41.1-alpine
        container_name: portainer
        restart: unless-stopped
        security_opt:
            - no-new-privileges:true
        volumes:
            - /etc/localtime:/etc/localtime:ro
            - /var/run/docker.sock:/var/run/docker.sock:ro
            - ${portainer_data}:/data
            # ports:
            #     - 9002:9000
        networks:
            home:
        healthcheck:
            test:
                [
                    "CMD",
                    "wget",
                    "--no-verbose",
                    "--tries=1",
                    "--spider",
                    "http://localhost:9000/api/system/status",
                ]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 10s

networks:
    home:
        external: true

volumes:
    caddy_config:
    piholeData:
    dozzle_data:
    beszel_socket:
    portainer_data:

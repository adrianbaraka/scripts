services:
  db:
    container_name: postgres
    image: postgres:18.3
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      start_period: 30s
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - db_data:/var/lib/postgresql

volumes:
  db_data:

- Media:
      - Jellyfin:
            icon: jellyfin.png
            href: https://jellyfin.{{HOMEPAGE_VAR_DOMAIN}}
            description: Media Server
            container: jellyfin
            widget:
                type: jellyfin
                url: http://jellyfin:8096
                key: {{HOMEPAGE_VAR_JELLYFIN_API_KEY}}
                version: 2
                enableBlocks: true
                enableNowPlaying: true
                enableMediaControl: false
                expandOneStreamToTwoRows: false
      - Kavita:
            icon: kavita.png
            href: https://kavita.{{HOMEPAGE_VAR_DOMAIN}}/login
            description: Kavita is a fast, feature rich, cross-platform reading server.
            container: kavita
            widget:
                  type: kavita
                  url: http://kavita:5000
                  key: {{HOMEPAGE_VAR_KAVITA_API}}
      - Tailscale:
            icon: tailscale.png
            description: Private WireGuard® networks made easy
            href: https://login.tailscale.com/admin/machines
            widget:
                  type: tailscale
                  deviceid: nCXxz9Rzj611CNTRL
                  key: {{HOMEPAGE_VAR_TS_API_KEY}}
      - Linkding:
            icon: linkding.png
            container: linkding
            description: Bookmark manager
            href: https://linkding.{{HOMEPAGE_VAR_DOMAIN}}
      - Caddy:
            icon: caddy.png
            container: caddy
            widget:
                type: caddy
                url: http://caddy:2019


- Management:
      - Beszel:
            icon: beszel.png
            href: https://beszel.{{HOMEPAGE_VAR_DOMAIN}}
            description: Resource Monitoring
            container: beszel
            widget:
                type: beszel
                url: http://beszel:8090
                username: {{HOMEPAGE_VAR_BESZEL_USERNAME}}
                password: {{HOMEPAGE_VAR_BESZEL_PASSWORD}}
                version: 2
      - Dozzle:
            icon: dozzle.png
            href: https://dozzle.{{HOMEPAGE_VAR_DOMAIN}}
            description: Container Logs
            container: dozzle
      - Uptime Kuma:
            icon: uptime-kuma.png
            href: https://uptime.{{HOMEPAGE_VAR_DOMAIN}}
            description: Status Monitoring
            container: uptime-kuma
      - pihole:
            icon: pi-hole.png
            href: https://pihole.{{HOMEPAGE_VAR_DOMAIN}}/admin
            description: DNS
            container: pihole
            widget:
                type: pihole
                url: http://pihole:80
                version: 6
                key: {{HOMEPAGE_VAR_PIHOLE_PASSWORD}}

      - portainer:
            icon: portainer.png
            href: https://portainer.{{HOMEPAGE_VAR_DOMAIN}}
            description: Container Management
            container: portainer
            widget:
                  type: portainer
                  url: http://portainer:9000
                  env: 3
                  key: {{HOMEPAGE_VAR_PORTAINER}}
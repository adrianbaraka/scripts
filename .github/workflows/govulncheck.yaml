on: [push]

jobs:
  govulncheck_job:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project-dir: [./mkvclean]
    
    name: Run govulncheck (${{ matrix.project-dir }})
    steps:
      - name: Run govulncheck
        uses: golang/govulncheck-action@v1
        with:
          go-version-file: ${{ matrix.project-dir }}/go.mod
          cache-dependency-path: ${{ matrix.project-dir }}/go.sum
          work-dir: ${{ matrix.project-dir }}
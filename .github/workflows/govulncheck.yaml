on: [push]

jobs:
  govulncheck_job:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # paths to all go apps
        project-dir: [./mkvclean]
    
    name: Run govulncheck (${{ matrix.project-dir }})
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run govulncheck
        uses: golang/govulncheck-action@v1
        with:
          go-version-file: ${{ matrix.project-dir }}/go.mod
          work-dir: ${{ matrix.project-dir }}